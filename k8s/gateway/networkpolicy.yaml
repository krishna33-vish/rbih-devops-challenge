apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: payment-gateway-netpol
  namespace: payments
spec:
  podSelector:
    matchLabels:
      app: payment-gateway

  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Accept traffic from anywhere (it's the public-facing entry point)
    - ports:
        - protocol: TCP
          port: 8080

  egress:
    # Only allow outbound to the payment-processor
    - to:
        - podSelector:
            matchLabels:
              app: payment-processor
      ports:
        - protocol: TCP
          port: 8080
    # DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
